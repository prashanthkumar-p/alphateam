<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily DCR Reflection</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      padding: 1rem;
      max-width: 600px;
      margin: auto;
    }
    h2 {
      text-align: center;
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 1rem;
    }
    input[type="text"],
    textarea,
    select {
      width: 100%;
      padding: 0.6rem;
      margin-top: 0.3rem;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 1.5rem;
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 0.7rem;
      width: 100%;
      font-size: 1rem;
      border-radius: 5px;
      cursor: pointer;
    }
    .output {
      margin-top: 2rem;
      background: #fff url('data:image/webp;base64,UklGRiIAAABXRUJQVlA4WAoAAAAQAAAACwAABwAAQUxQSBQAAAABYktHRAD/AABEIABkAGQAwKgAAABwAgCdASoIAAgAAkA4JZwEAAD+/gb5zjCyDBAAA') no-repeat center top;
      background-size: 80px;
      padding: 1rem;
      border-radius: 5px;
      border: 1px solid #ccc;
      white-space: pre-wrap;
      text-align: center;
    }
    #otherExerciseContainer {
      display: none;
    }
  </style>
</head>
<body>
  <h2>Daily DCR Reflection</h2>
  <form id="reflectionForm">
    <label for="name">Name</label>
    <input type="text" id="name" required />

    <label for="dcr">DCR</label>
    <select id="dcr">
      <option value="">-- Select --</option>
      <option value="30DCR">30DCR</option>
      <option value="90DCR">90DCR</option>
    </select>

    <label for="dcrDay">Day of Core Run</label>
    <select id="dcrDay"></select>

    <label for="u">U (Used all the products you can)</label>
    <select id="u">
      <option value="Yes - All I could use today">Yes - All I could use today</option>
      <option value="No">No</option>
    </select>

    <label for="audioTrack">L - Audio Track</label>
    <input type="text" id="audioTrack" />

    <label for="speaker">L - Speaker</label>
    <input type="text" id="speaker" />

    <label for="listenTakeaway">L - Key Takeaways</label>
    <textarea id="listenTakeaway"></textarea>

    <label for="book">R - Book Title</label>
    <input type="text" id="book" />

    <label for="chapterNumber">R - Chapter Number</label>
    <input type="text" id="chapterNumber" />

    <label for="chapterName">R - Chapter Name</label>
    <input type="text" id="chapterName" />

    <label for="associate">A - Associate (VES)</label>
    <select id="associate">
      <option value="NA VES">NA VES</option>
      <option value="UK VES">UK VES</option>
      <option value="IND VES">IND VES</option>
      <option value="AUS VES">AUS VES</option>
    </select>

    <label for="aFollow">What’s one step you’re not willing to delay?</label>
    <input type="text" id="aFollow" />

    <label for="accountability">A - Accountability Message</label>
    <select id="accountability">
      <option value="This message">This message</option>
    </select>

    <label for="conversation">C - Conversations Initiated</label>
    <select id="conversation">
      <option value="Yes">Yes</option>
      <option value="No">No</option>
    </select>

    <label for="mode">Mode</label>
    <select id="mode">
      <option value="Online">Online</option>
      <option value="Offline">Offline</option>
      <option value="Both">Both</option>
    </select>

    <label for="journal">When you look back on today, who did you intentionally connect with?</label>
    <input type="text" id="journal" />

    <button type="submit">Submit</button>
  </form>

  <div class="output" id="output"></div>

  <canvas id="confetti-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <script>
    const dcr = document.getElementById("dcr");
    const dcrDay = document.getElementById("dcrDay");
    dcr.addEventListener("change", () => {
      const maxDay = dcr.value === "30DCR" ? 30 : dcr.value === "90DCR" ? 90 : 0;
      dcrDay.innerHTML = "";
      for (let i = 1; i <= maxDay; i++) {
        const option = document.createElement("option");
        option.value = `${i}/${maxDay}`;
        option.textContent = `${i}/${maxDay}`;
        dcrDay.appendChild(option);
      }
    });
    });

    document.getElementById("reflectionForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const dcrValue = document.getElementById("dcr").value;
      const dcrDayValue = document.getElementById("dcrDay").value;
      const u = document.getElementById("u").value;
      const audio = document.getElementById("audioTrack").value;
      const speaker = document.getElementById("speaker").value;
      const listenTakeaway = document.getElementById("listenTakeaway").value;
      const book = document.getElementById("book").value;
      const chapterNumber = document.getElementById("chapterNumber").value;
      const chapterName = document.getElementById("chapterName").value;
      const associate = document.getElementById("associate").value;
      const aFollow = document.getElementById("aFollow").value;
      const accountability = document.getElementById("accountability").value;
      const conversation = document.getElementById("conversation").value;
      const mode = document.getElementById("mode").value;
      const journal = document.getElementById("journal").value;

      const result = `**${name} ${dcrValue}**\n\n` +
        `**U:** ${u}\n` +
        `**L:** ${audio} - ${speaker}\n${listenTakeaway}\n` +
        `**R:** ${book} - ${chapterNumber} - ${chapterName}\n` +
        `**A:** ${associate}\n**Key Step:** ${aFollow}\n` +
        `**A:** ${accountability}\n` +
        `**C:** ${conversation}\nMode: ${mode === "Both" ? "Online and Offline" : mode}\n` +
        `**Journal:** ${journal}`;

      const output = document.getElementById("output");
      output.textContent = result;
      navigator.clipboard.writeText(result);

      if (["30/30", "60/90", "90/90"].includes(dcrDayValue)) {
        confetti();
      }
    });
  </script>
</body>
</html>
